	<title>Contact Form</title>

</head>
<body>
	<div class ="container">
		<form onsubmit="sendEmail(); reset(); return false;"> <!--Not giving a return-->

	</div>
	<script> src="https://smtpjs.com/v3/smtp.js"</script>

			Email.send({
				Host : "smtp.gmail.com",
				Username : "dan.odonnell928@gmail.com",
				Password : "Funnykittens22",
				To : 'dan.odonnell928@gmail.com',
				From : "document.getElementByID("email").value,
				Subject : "New Contact from'The Menu'",
				Body : "message:"
			}).then(
			  message => alert(message)
			);
		}
	</script>
